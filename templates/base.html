<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title else "PipeGuard" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle" />

    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 10h6v4H3v-4Zm12 0h6v4h-6v-4ZM9 11.5h6v1H9v-1Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="10.5" cy="12" r="1.25" fill="currentColor"/>
              <circle cx="13.5" cy="12" r="1.25" fill="currentColor"/>
            </svg>
          </div>
          <div>
            <h1>PipeGuard</h1>
            <p>Leakage Detection System</p>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-label">Detection Tools</div>

        <nav class="sidebar-nav">
          <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M3 8.5 10 3l7 5.5V17H3V8.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                <path d="M8 17v-4h4v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Dashboard</span>
          </a>

          <a href="/upload" class="nav-link{% if request.url.path == '/upload' %} active{% endif %}">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <rect x="3" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.7"/>
                <circle cx="9" cy="10" r="2.2" stroke="currentColor" stroke-width="1.7"/>
                <path d="M15.5 7.5h.01" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Image Detection</span>
          </a>

          <a href="/sensor" class="nav-link{% if request.url.path == '/sensor' %} active{% endif %}">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M3 14h2.5l2-6 3.2 8 2.1-5H17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Sensor Analysis</span>
          </a>

          <a href="/dashboard" class="nav-link{% if request.url.path == '/dashboard' %} active{% endif %}">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <rect x="3" y="4" width="6" height="5" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
                <rect x="11" y="4" width="6" height="5" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
                <rect x="7" y="11" width="6" height="5" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
              </svg>
            </span>
            <span>Unified Analysis</span>
            <span class="coming-badge">Coming Soon</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <span>v1.0.0</span>
          <a href="/docs">Docs</a>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="mobile-topbar">
        <label for="sidebar-toggle" class="menu-button" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <div class="mobile-brand">
          <span>PipeGuard</span>
          <small>Leakage Detection System</small>
        </div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
