{% extends "base.html" %}

{% block content %}
<section class="panel upload-panel">
  <h2>Upload an Image for Leak Detection</h2>
  <form id="detectForm" class="upload-form">
    <label class="form-label">Select pipeline image</label>
    <input type="file" name="image" id="imageInput" accept="image/jpeg,image/png,image/webp" required />

    <label class="form-label">Confidence threshold: <span id="thresholdValue">0.25</span></label>
    <input type="range" id="confidence" name="confidence_threshold" min="0.1" max="1.0" step="0.05" value="0.25" />

    <button type="submit" class="btn btn-primary" id="uploadButton">Run Detection</button>
  </form>

  <div id="statusBox" class="status-box" style="display:none;"></div>
  <div id="resultBox" class="result-box" style="display:none;"></div>
</section>

<script>
const form = document.getElementById('detectForm');
const statusBox = document.getElementById('statusBox');
const resultBox = document.getElementById('resultBox');
const uploadButton = document.getElementById('uploadButton');
const thresholdValue = document.getElementById('thresholdValue');
const confidence = document.getElementById('confidence');
confidence.addEventListener('input', () => thresholdValue.textContent = confidence.value);

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  statusBox.style.display = 'block';
  resultBox.style.display = 'none';
  statusBox.textContent = 'Uploading image and running inference...';
  uploadButton.disabled = true;

  const formData = new FormData(form);

  try {
    const response = await fetch('/api/v1/detect', {
      method: 'POST',
      body: formData,
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.detail || 'Unknown error occurred');
    }

    const data = await response.json();
    statusBox.textContent = `Detected ${data.detection_count} objects with inspection ID ${data.inspection_id}.`;

    const resultsHtml = `
      <h3>Detection Results</h3>
      <p><strong>Inspection ID:</strong> ${data.inspection_id}</p>
      <p><strong>Detected Objects:</strong> ${data.detection_count}</p>
      <div class="result-image">
        <img src="${data.result_image_url}" alt="Detection result" />
      </div>
      <table class="result-table">
        <thead>
          <tr><th>#</th><th>Label</th><th>Confidence</th><th>BBox (x1,y1,x2,y2)</th></tr>
        </thead>
        <tbody>
          ${data.detections.map((d, i) => {
            const bbox = d.bbox;
            const bboxText = `${bbox.x1}, ${bbox.y1}, ${bbox.x2}, ${bbox.y2}`;
            return `
            <tr>
              <td>${i + 1}</td>
              <td>${d.label}</td>
              <td>${(d.confidence * 100).toFixed(1)}%</td>
              <td>${bboxText}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;

    resultBox.innerHTML = resultsHtml;
    resultBox.style.display = 'block';

  } catch (err) {
    statusBox.textContent = `Error: ${err.message}`;
    statusBox.classList.add('error');
  } finally {
    uploadButton.disabled = false;
  }
});
</script>
{% endblock %}
